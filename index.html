<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
body {
  margin:0;
  height:100vh;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:sans-serif;
  overflow:hidden;
}

/* CARD */
.card{
  background:white;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:380px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  position:relative;
}

/* BUTTON */
button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:white;
  font-size:16px;
}

/* TEXT ANIMATION */
#intro{
  font-size:16px;
  margin-top:10px;
  min-height:40px;
  color:#444;
}

/* IMAGE */
img{
  width:100%;
  border-radius:15px;
  margin-top:10px;
  opacity:0;
  transform:scale(0.95);
  transition:0.7s;
}

.show{
  opacity:1 !important;
  transform:scale(1) !important;
}

/* FLOAT HEART */
.heart{
  position:absolute;
  color:#ff4d6d;
  animation: floatUp 4s linear infinite;
}

@keyframes floatUp{
  0%{transform:translateY(100px); opacity:1;}
  100%{transform:translateY(-500px); opacity:0;}
}
</style>
</head>

<body>

<div class="card">
  <h2>💌 Ada sesuatu buat kamu</h2>
  <button onclick="start()">Buka 💖</button>

  <div id="intro"></div>

  <img id="foto">

</div>

<script>
const images = [
"foto1","foto2","foto3","foto4","foto5",
"foto6","foto7","foto8","foto9","foto10",
"foto11","foto12","foto13","foto14","foto15"
];

let i=0;
let music;

// TEKS BIAR TIDAK KOSONG
const texts = [
"aku ada sesuatu buat kamu...",
"bukan hal besar, tapi penting...",
"aku cuma mau bilang...",
"kamu itu berarti banget...",
"dan hari ini spesial...",
"selamat ulang tahun 💖"
];

function typeText(text){
  let el=document.getElementById("intro");
  el.innerHTML="";
  let j=0;

  let t=setInterval(()=>{
    el.innerHTML+=text[j];
    j++;
    if(j>=text.length) clearInterval(t);
  },50);
}

function start(){
  document.querySelector("button").style.display="none";

  // intro pertama
  typeText(texts[0]);

  setTimeout(()=>{
    showImage();
    loveRain();
  },1500);

  setInterval(()=>{
    i++;
    if(i>=images.length) i=0;
    showImage();
  },2500);

  // teks jalan
  let t=1;
  setInterval(()=>{
    if(t<texts.length){
      typeText(texts[t]);
      t++;
    }
  },3000);
}

function showImage(){
  let img=document.getElementById("foto");
  img.classList.remove("show");

  setTimeout(()=>{
    tryLoad(img,images[i],0);
  },200);
}

function tryLoad(img,name,step){
  const ext=[".jpg",".jpeg",".JPG"];
  if(step>=ext.length) return;

  img.src=name+ext[step];

  img.onload=()=>{
    img.classList.add("show");
  }

  img.onerror=()=>{
    tryLoad(img,name,step+1);
  }
}

/* LOVE EFFECT */
function loveRain(){
  setInterval(()=>{
    let heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"%";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),4000);
  },300);
}
</script>

</body>
</html>

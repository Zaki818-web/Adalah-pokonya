<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Untuk Kamu 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  font-family:'Poppins',sans-serif;
}

.card{
  width:90%;
  max-width:380px;
  background:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
  font-weight:600;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:white;
  font-size:15px;
}

/* FOTO */
img{
  width:100%;
  margin-top:15px;
  border-radius:15px;
  opacity:0;
  transform:scale(0.95);
  transition:0.8s ease;
}

.show{
  opacity:1 !important;
  transform:scale(1) !important;
}

/* TEKS ROMANTIS */
#text{
  margin-top:10px;
  font-size:14px;
  color:#444;
  min-height:60px;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="card">
  <h2>💌 Special For You</h2>

  <button onclick="start()">Buka 💖</button>

  <div id="text"></div>

  <img id="foto">
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<script>

const images=[
"foto1","foto2","foto3","foto4","foto5",
"foto6","foto7","foto8","foto9","foto10",
"foto11","foto12","foto13","foto14","foto15"
];

const messages=[
"aku nggak tau harus mulai dari mana...",
"tapi hari ini aku cuma mau kamu tahu satu hal...",
"kamu itu berarti banget buat aku.",
"bukan karena kamu sempurna...",
"tapi karena kamu selalu jadi alasan aku tenang.",
"setiap hari aku bersyukur pernah kenal kamu.",
"walaupun kita nggak selalu sempurna...",
"tapi aku selalu mau ada di sisi kamu.",
"kalau dunia lagi nggak baik ke kamu...",
"aku harap kamu ingat kalau aku selalu di sini.",
"selamat ulang tahun ya ❤️",
"semoga semua yang kamu mau pelan-pelan tercapai.",
"dan semoga kamu nggak pernah merasa sendirian lagi.",
"aku mungkin nggak selalu bisa sempurna...",
"tapi aku selalu mau berusaha buat kamu."
];

let i=0;
let t=0;

let music=document.getElementById("music");

function start(){

  document.querySelector("button").style.display="none";

  music.play();

  showImage();
  typeText();

  setInterval(()=>{
    i++;
    if(i>=images.length) i=0;
    showImage();
  },2500);

  setInterval(()=>{
    t++;
    if(t>=messages.length) t=0;
    typeText();
  },4000);
}

/* FOTO */
function showImage(){
  let img=document.getElementById("foto");
  img.classList.remove("show");

  setTimeout(()=>{
    load(img,images[i],0);
  },200);
}

/* AUTO DETECT */
function load(img,name,step){
  const ext=[".jpg",".jpeg",".JPG"];

  if(step>=ext.length) return;

  img.src=name+ext[step];

  img.onload=()=>{
    img.classList.add("show");
  }

  img.onerror=()=>{
    load(img,name,step+1);
  }
}

/* TEKS NGETIK */
function typeText(){
  let el=document.getElementById("text");
  el.innerHTML="";
  let word=messages[t];
  let i=0;

  let typing=setInterval(()=>{
    el.innerHTML+=word[i];
    i++;
    if(i>=word.length){
      clearInterval(typing);
    }
  },40);
}

</script>

</body>
</html>

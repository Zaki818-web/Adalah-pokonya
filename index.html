<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu 💖</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
  overflow: hidden;
}

.card {
  text-align: center;
  background: white;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 360px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  font-size: 16px;
}

h1 {
  color: #ff4d6d;
  font-size: 22px;
}

p {
  font-size: 15px;
}

img {
  width: 100%;
  border-radius: 15px;
  margin-top: 10px;
  transition: 0.8s ease;
  opacity: 0;
  transform: scale(0.95);
}

.show {
  opacity: 1 !important;
  transform: scale(1) !important;
}
</style>
</head>

<body>

<div class="card">
  <h2>💌 Ada sesuatu buat kamu</h2>
  <button onclick="start()">Klik ya sayang 💖</button>

  <div id="content" style="display:none;">
    <h1>🎉 Happy Birthday 🎉</h1>
    <p>Semoga kamu selalu bahagia ❤️</p>

    <img id="foto" src="" alt="foto">
  </div>
</div>

<script>
const baseNames = [
  "foto1","foto2","foto3","foto4","foto5",
  "foto6","foto7","foto8","foto9","foto10",
  "foto11","foto12","foto13","foto14","foto15"
];

let index = 0;
let interval;

function start() {
  document.querySelector("button").style.display = "none";
  document.getElementById("content").style.display = "block";

  showImage();

  interval = setInterval(() => {
    index++;
    if (index >= baseNames.length) index = 0;
    showImage();
  }, 2500);
}

function showImage() {
  const img = document.getElementById("foto");
  img.classList.remove("show");

  setTimeout(() => {
    tryLoad(img, baseNames[index], 0);
  }, 200);
}

// AUTO DETECT JPG / JPEG / JPG
function tryLoad(img, name, step) {
  const formats = [".jpg", ".jpeg", ".JPG"];

  if (step >= formats.length) return;

  img.src = name + formats[step];

  img.onload = () => {
    img.classList.add("show");
  };

  img.onerror = () => {
    tryLoad(img, name, step + 1);
  };
}
</script>

</body>
</html>
